name: Sync VMPay

on:
  schedule:
    # Runs every day at 00:00 UTC (Meia noite)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allows manual triggering

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run Sync Script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          VMPAY_API_KEY: ${{ secrets.VMPAY_API_KEY }}
        run: npm run db:sync
